; AgriMeshAI — ESP32 Firmware
; PlatformIO project: lora_gateway + sensor_node + actuator_node
;
; Quick start:
;   pio run -e lora_gateway    # Build & upload LoRa Gateway
;   pio run -e sensor_node      # Build & upload sensor firmware
;   pio run -e actuator_node    # Build & upload actuator firmware

[platformio]
default_envs = lora_gateway
description = AgriMeshAI — LoRa Mesh Gateway, Sensor & Actuator Nodes

; ── Common settings ──────────────────────────────────────────────

[common]
monitor_speed = 115200
board_build.flash_mode = qio

; ── Defaults inherited by all [env:NAME] sections ────────────────
[env]
framework = arduino
lib_deps =
    https://github.com/LoRaMesher/LoRaMesher.git
    https://github.com/adafruit/DHT-sensor-library.git
    ; BH1750: uncomment if you have the sensor
    ; https://github.com/Starmbi/hp_BH1750.git

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DLORAMESHER_DEBUG=0
    ; -DUSE_BH1750    # uncomment if BH1750 light sensor connected

; ── LoRa Gateway (ESP32-S3 + SX1262) — UART ↔ LoRa Bridge ─────────

[env:lora_gateway]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
build_src_filter = +<*> -<sensor_main*> -<actuator_main*>
monitor_filters = time

; ── Sensor node (ESP32-S3 + SX1262 + DHT22) ─────────────────────

[env:sensor_node]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
build_src_filter = +<*> -<lora_gateway_main*> -<actuator_main*>
monitor_filters = time

; ── Actuator node (ESP32-S3 + SX1262 + Relay) ────────────────────

[env:actuator_node]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
build_src_filter = +<*> -<lora_gateway_main*> -<sensor_main*>
monitor_filters = time
