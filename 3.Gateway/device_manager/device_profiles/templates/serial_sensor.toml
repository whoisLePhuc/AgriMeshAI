# Serial Sensor — any device speaking text commands over UART/USB serial
#
# Works with any microcontroller (ESP32, Arduino, Pico, STM32, etc.)
# that accepts newline-terminated text commands and responds with plain
# text values. This is the simplest way to connect a sensor to AgriMeshAI.
#
# Protocol:
#   Gateway sends:  "READ_TEMP\n"
#   Device replies:  "22.5\n"
#
# The tools below assume a temperature + humidity sensor (e.g. DHT22,
# BME280, SHT31), but you can change the commands and return types for
# any sensor — pressure, weight, vibration, whatever.
#
# ── Example Arduino/ESP32 firmware ──────────────────────────────────
#
#   #include <DHT.h>
#   DHT dht(4, DHT22);  // data pin, sensor type
#
#   void setup() {
#     Serial.begin(115200);
#     dht.begin();
#   }
#
#   void loop() {
#     if (Serial.available()) {
#       String cmd = Serial.readStringUntil('\n');
#       cmd.trim();
#
#       if (cmd == "READ_TEMP") {
#         Serial.println(dht.readTemperature());
#       } else if (cmd == "READ_HUMID") {
#         Serial.println(dht.readHumidity());
#       } else if (cmd == "READ_ALL") {
#         Serial.print(dht.readTemperature());
#         Serial.print(",");
#         Serial.println(dht.readHumidity());
#       } else if (cmd == "STATUS") {
#         float t = dht.readTemperature();
#         Serial.println(isnan(t) ? "ERROR" : "OK");
#       } else if (cmd == "PING") {
#         Serial.println("PONG");
#       }
#     }
#   }
#
# ── Example Raspberry Pi Pico (MicroPython, USB serial) ────────────
#
#   import sys, select
#   from machine import Pin
#   from dht import DHT22
#
#   sensor = DHT22(Pin(15))
#
#   while True:
#       if select.select([sys.stdin], [], [], 0)[0]:
#           cmd = sys.stdin.readline().strip()
#           sensor.measure()
#           if cmd == "READ_TEMP":
#               print(sensor.temperature())
#           elif cmd == "READ_HUMID":
#               print(sensor.humidity())
#           elif cmd == "READ_ALL":
#               print(f"{sensor.temperature()},{sensor.humidity()}")
#           elif cmd == "STATUS":
#               print("OK")
#           elif cmd == "PING":
#               print("PONG")
#
# ────────────────────────────────────────────────────────────────────

[device]
name = "serial_sensor"
description = "Sensor connected via serial (UART/USB)"

[connection]
protocol = "serial"
port = "/dev/ttyUSB0"
baud_rate = 115200
# Some sensors (e.g. DHT22) take ~2s to read; allow headroom
timeout_ms = 3000

[[tools]]
name = "get_temperature"
description = "Get current temperature reading"
command = "READ_TEMP"

[tools.returns]
type = "float"
unit = "celsius"

[[tools]]
name = "get_humidity"
description = "Get current relative humidity reading"
command = "READ_HUMID"

[tools.returns]
type = "float"
unit = "percent"

[[tools]]
name = "get_reading"
description = "Get both temperature (celsius) and humidity (percent) in one call"
command = "READ_ALL"

[tools.returns]
type = "string"

[[tools]]
name = "get_status"
description = "Check if the sensor is operating normally"
command = "STATUS"

[tools.returns]
type = "string"

[health]
check_command = "PING"
expected = "PONG"
interval_ms = 10000
