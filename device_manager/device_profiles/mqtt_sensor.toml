# MQTT Sensor — any device publishing sensor data over MQTT
#
# Works with any WiFi-capable board (Pico W, ESP32, ESP8266, etc.)
# that connects to an MQTT broker and responds to commands via a
# request/reply topic pattern.
#
# Protocol:
#   Gateway publishes:  "READ_TEMP"  → {topic_prefix}/cmd
#   Device publishes:   "22.5"       → {topic_prefix}/response
#
# The tools below assume a temperature + humidity sensor (e.g. DHT22,
# BME280, SHT31), but you can change the commands and return types for
# any sensor.
#
# MQTT topics (relative to topic_prefix):
#   {topic_prefix}/cmd      → gateway sends commands here
#   {topic_prefix}/response → device sends responses here
#   {topic_prefix}/status   → "online" / "offline" (LWT)
#
