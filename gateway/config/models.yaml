# AgriMeshAI — Model Configuration
# LLM Server configuration. Edge gateway connects to LLM Server via Tailscale/WAN
# for AI chat and tool calling. When LLM Server is unreachable, the gateway operates
# in offline mode: data collection, recording, and threshold-based alerts only.

llm:
  provider: ollama
  model: qwen2.5:7b
  # LLM Server endpoint (PC, cloud, or local)
  api_url: http://100.125.217.6:11434/v1
  # api_url: http://localhost:11434/v1  # Ollama local
  max_tokens: 4096
  temperature: 0.2
  keep_alive: 5m
