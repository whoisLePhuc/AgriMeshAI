; AgriMeshAI — ESP32 Firmware (Modular)
;
; Module structure:
;   src/main/         — Entry points (thin setup + loop)
;   src/core/         — LoRa mesh + node identity (shared)
;   src/sensor/       — Sensor reading (sensor nodes only)
;   src/actuator/     — Relay control + safety (actuator nodes only)
;   src/gateway/      — AT dispatch, pending, node table, heartbeat (gateway only)
;   src/common/       — Log, watchdog, blink (all nodes)
;   lib/mesh_protocol/— Packet structs, AT protocol, ringbuf (shared)
;
; Quick start:
;   pio run -e lora_gateway    # Build LoRa Gateway
;   pio run -e sensor_node     # Build sensor firmware
;   pio run -e actuator_node   # Build actuator firmware

[platformio]
default_envs = lora_gateway
description = AgriMeshAI — LoRa Mesh Gateway, Sensor & Actuator Nodes

; ── Common settings ──────────────────────────────────────────────

[common]
monitor_speed = 115200
board_build.flash_mode = qio

; ── Defaults inherited by all [env:NAME] sections ────────────────
[env]
framework = arduino
lib_deps =
    https://github.com/LoRaMesher/LoRaMesher.git
    https://github.com/adafruit/DHT-sensor-library.git
    ; BH1750: uncomment if you have the sensor
    ; https://github.com/Starmbi/hp_BH1750.git

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DLORAMESHER_DEBUG=0
    ; -DUSE_BH1750    # uncomment if BH1750 light sensor connected

; ── LoRa Gateway (ESP32-S3 + SX1262) — UART ↔ LoRa Bridge ─────────

[env:lora_gateway]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
build_src_filter = +<main/lora_gateway_main*> +<core/*> +<gateway/*> +<common/*>
monitor_filters = time

; ── Sensor node (ESP32-S3 + SX1262 + DHT22) ─────────────────────

[env:sensor_node]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
build_src_filter = +<main/sensor_main*> +<core/*> +<sensor/*> +<common/*>
monitor_filters = time

; ── Actuator node (ESP32-S3 + SX1262 + Relay) ────────────────────

[env:actuator_node]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
build_src_filter = +<main/actuator_main*> +<core/*> +<actuator/*> +<common/*>
monitor_filters = time
